name: Renovate

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  renovate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: renovatebot/github-action@v46.1.6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
