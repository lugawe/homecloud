apiVersion: argoproj.io/v1alpha1

kind: Application

metadata:
  name: homecloud
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.io/foreground

spec:
  project: default
  source:
    repoURL: https://github.com/lugawe/homecloud.git
    targetRevision: HEAD
    path: kustomize/overlays/homecloud
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
