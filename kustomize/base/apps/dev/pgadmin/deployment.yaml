apiVersion: apps/v1

kind: Deployment

metadata:
  namespace: dev
  name: pgadmin
  labels:
    app: pgadmin

spec:
  replicas: 1
  selector:
    matchLabels:
      app: pgadmin
  template:
    metadata:
      labels:
        app: pgadmin
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 5050
        runAsGroup: 5050
        fsGroup: 5050
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: pgadmin
          image: dpage/pgadmin4:9.14.0
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: PGADMIN_LISTEN_PORT
              value: 5050
          envFrom:
            - secretRef:
                name: dev-secrets
          volumeMounts:
            - name: pgadmin-storage
              mountPath: /var/lib/pgadmin
      volumes:
        - name: pgadmin-storage
          persistentVolumeClaim:
            claimName: pgadmin-pvc
