apiVersion: apps/v1

kind: Deployment

metadata:
  namespace: vaultwarden
  name: vaultwarden-app
  labels:
    app: vaultwarden-app

spec:
  replicas: 1
  selector:
    matchLabels:
      app: vaultwarden-app
  template:
    metadata:
      labels:
        app: vaultwarden-app
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: vaultwarden-app
          image: vaultwarden/server:1.35.6-alpine
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          envFrom:
            - secretRef:
                name: vaultwarden-secrets
          volumeMounts:
            - name: vaultwarden-app-storage
              mountPath: /data
              subPath: data
      volumes:
        - name: vaultwarden-app-storage
          persistentVolumeClaim:
            claimName: vaultwarden-app-pvc
