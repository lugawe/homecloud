apiVersion: kustomize.config.k8s.io/v1beta1

kind: Kustomization

namespace: tailscale

resources:
  - namespace.yaml
  - dns.yaml

helmCharts:
  - namespace: tailscale
    releaseName: tailscale-operator
    repo: https://pkgs.tailscale.com/helmcharts
    name: tailscale-operator
    version: 1.94.2
    includeCRDs: true
    valuesInline:
      oauthSecretVolume:
        secret:
          secretName: tailscale-secrets
      operatorConfig:
        defaultTags:
          - tag:k8s
          - tag:homecloud
      apiServerProxyConfig:
        mode: "true"
