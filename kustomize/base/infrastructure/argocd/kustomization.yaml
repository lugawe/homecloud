apiVersion: kustomize.config.k8s.io/v1beta1

kind: Kustomization

namespace: argocd

resources:
  - namespace.yaml

helmCharts:
  - namespace: argocd
    releaseName: argocd
    repo: https://argoproj.github.io/argo-helm
    name: argo-cd
    version: 3.3.5
    includeCRDs: true
    valuesInline:
      server:
        insecure: true
