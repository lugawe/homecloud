---
apiVersion: v1
kind: ServiceAccount
metadata:
  namespace: keycloak
  name: vault-auth
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata:
  namespace: keycloak
  name: vault-auth
spec:
  method: kubernetes
  mount: kubernetes
  kubernetes:
    role: keycloak
    serviceAccount: vault-auth
    audiences:
      - vault
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  namespace: keycloak
  name: keycloak-secrets
spec:
  type: kv-v2
  mount: secret
  path: homecloud/keycloak
  destination:
    name: keycloak-secrets
    create: true
    overwrite: true
    labels:
      app.kubernetes.io/part-of: keycloak
  vaultAuthRef: vault-auth
  refreshAfter: 1h
