---
apiVersion: v1
kind: ServiceAccount
metadata:
  namespace: monitoring
  name: vault-auth
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata:
  namespace: monitoring
  name: vault-auth
spec:
  method: kubernetes
  mount: kubernetes
  kubernetes:
    role: monitoring
    serviceAccount: vault-auth
    audiences:
      - vault
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  namespace: monitoring
  name: monitoring-secrets
spec:
  type: kv-v2
  mount: secret
  path: homecloud/monitoring
  destination:
    name: monitoring-secrets
    create: true
    overwrite: true
  vaultAuthRef: vault-auth
  refreshAfter: 1h
