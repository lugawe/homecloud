apiVersion: v1

kind: Service

metadata:
  namespace: monitoring
  name: grafana
  labels:
    app: grafana

spec:
  selector:
    app: grafana
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 3000
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
    - name: loki
      port: 3100
      targetPort: 3100
    - name: prometheus
      port: 9090
      targetPort: 9090
