apiVersion: kustomize.config.k8s.io/v1beta1

kind: Kustomization

resources:
  - namespace.yaml

helmCharts:
  - name: longhorn
    repo: https://charts.longhorn.io
    releaseName: longhorn
    namespace: longhorn-system
    version: 1.11.1
    includeCRDs: true
    valuesInline:
      defaultSettings:
        defaultReplicaCount: 1
      persistence:
        defaultClassReplicaCount: 1
